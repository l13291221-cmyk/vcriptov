{% extends "base.html" %}
{% block title %}Verifica accesso — VCriptoV{% endblock %}

{% block content %}
<div class="auth-card">
  <div class="brand-row">
    <div class="brand-logo brand-logo--img"><img src="{{ url_for('static', filename='logo.png') }}?v={{ asset_v }}" alt="VCriptoV" /></div>
    <div class="brand-name">Verifica in 2 passaggi</div>
  </div>
  <p class="lead">Per sicurezza ti abbiamo inviato un <strong>codice</strong> a
  <strong>{{ creator_email }}</strong>. Inseriscilo per completare l'accesso.</p>

  <form method="POST" action="{{ url_for('admin_2fa') }}">
    <div class="field">
      <label>Codice ricevuto via email</label>
      <input type="text" name="code" inputmode="numeric" placeholder="es. 123456" autocomplete="off" required autofocus />
    </div>
    <button type="submit" class="btn btn-primary btn-block">Verifica ed entra →</button>
  </form>

  <p class="hint" style="margin-top:16px;text-align:center;">
    <a href="{{ url_for('admin_login') }}">← Rifai il login</a>
  </p>
</div>
{% endblock %}
